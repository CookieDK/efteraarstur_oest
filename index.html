<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studietur Sjælland – Rutekort</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; padding: 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #5f5e5a; margin-bottom: 16px; }
  .zoom-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .zoom-bar span { font-size: 11px; color: #5f5e5a; }
  .zoom-btn { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; color: #fff; }
  .map-wrap { border-radius: 10px; overflow: hidden; border: 0.5px solid #d4d3ce; margin-bottom: 16px; }
  #map { height: 550px; width: 100%; }
  .hint { font-size: 11px; color: #5f5e5a; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .card { background: #fff; border-radius: 10px; border: 0.5px solid #d4d3ce; overflow: hidden; }
  .card-day { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.65); }
  .card-title { font-size: 13px; font-weight: 500; color: #fff; margin-top: 1px; }
  .card-sub { font-size: 11px; color: rgba(255,255,255,0.78); }
  .card-body { padding: 10px 12px 2px; }
  .stop-row { display: flex; align-items: flex-start; gap: 8px; padding-bottom: 11px; }
  .stop-num { border-radius: 50%; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; margin-top: 2px; color: #fff; }
  .stop-name { font-size: 12px; font-weight: 500; line-height: 1.3; cursor: pointer; text-underline-offset: 2px; text-decoration: underline; }
  .stop-desc { font-size: 11px; color: #5f5e5a; line-height: 1.35; margin-top: 1px; }
  .stop-teaser { font-size: 11px; color: #343330; line-height: 1.38; margin-top: 3px; }
  .stop-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
  .stop-links a { font-size: 10.5px; color: #185FA5; text-decoration: none; border-bottom: 1px solid #185FA555; }
  .warn-box { margin: 0 12px 10px; padding: 7px 10px; border-radius: 6px; background: #faeeda; border-left: 3px solid #ba7517; font-size: 11px; color: #854f0b; line-height: 1.45; }
  .extra-box { margin: 0 12px 10px; padding: 8px 10px; border-radius: 6px; background: #eef6f3; border-left: 3px solid #0F6E56; }
  .extra-title { font-size: 11px; font-weight: 700; color: #0F6E56; margin-bottom: 5px; }
  .extra-item { font-size: 11px; color: #343330; line-height: 1.4; margin: 5px 0; }
  .extra-item a { color: #0F6E56; font-weight: 600; text-decoration: none; border-bottom: 1px solid #0F6E5655; }
  .card-footer { padding: 6px 12px 8px; border-top: 0.5px solid #d4d3ce; background: #f9f8f6; display: flex; align-items: flex-start; gap: 6px; }
  .card-footer i { font-size: 13px; color: #5f5e5a; margin-top: 1px; }
  .card-footer span { font-size: 11px; color: #5f5e5a; line-height: 1.4; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } #map { height: 380px; } }
</style>
</head>
<body>
<h1>Studietur Sjælland – Rutekort</h1>
<p class="subtitle">2 dages studietur · 5 stop · Den Kolde Krig og besættelsestiden · Lørdag–søndag</p>

<div class="zoom-bar">
  <span>Zoom til:</span>
  <button class="zoom-btn" style="background:#5F5E5A" onclick="zoomRegion('all')">Hele ruten</button>
  <button class="zoom-btn" style="background:#185FA5" onclick="zoomRegion('dag1')">Dag 1 – Slagelse, Vestvolden &amp; Holmen</button>
  <button class="zoom-btn" style="background:#0F6E56" onclick="zoomRegion('dag2')">Dag 2 – København C</button>
</div>

<div class="map-wrap"><div id="map"></div></div>
<p class="hint"><i class="ti ti-hand-click" style="font-size:14px;" aria-hidden="true"></i> Klik på et lokationsnavn for at springe til stedet på kortet</p>

<div class="grid">
  <div class="col" id="col-a"></div>
  <div class="col" id="col-b"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const COLORS={1:'#185FA5',2:'#0F6E56'};

const STOPS=[
  {"n":1,"day":1,"lat":55.3498,"lng":11.5056,
   "name":"Museum East – Pansermuseum",
   "meta":"Fladholtevej 18, 4200 Slagelse",
   "teaser":"Skandinaviens største museum for Den Kolde Krig med fokus på Warszawapagten og panserkøretøjer. · Voksne: 150 kr. · Grupper (min. 15 pers.): 130 kr./pers. · Krigsveteraner: 130 kr.",
   "links":[["Læs mere","https://panzermuseumeast.dk/"],["Kort","https://maps.google.com/?q=55.3498,11.5056"]]},

  {"n":2,"day":1,"lat":55.6899,"lng":12.4366,
   "name":"Ejbybunkeren / Oplevelsescenter Vestvolden",
   "meta":"Jyllingevej 303, 2610 Rødovre",
   "teaser":"Den Kolde Krigs tophemmelige kontrolcentral i en autentisk bunker på Vestvolden – passer oplagt til koldkrigstemaet. · Voksne: 65 kr. · Grupper (min. 10 pers.): 55 kr./pers.",
   "links":[["Læs mere","https://www.vestvolden.dk/ejbybunkeren/"],["Kort","https://maps.google.com/?q=55.6899,12.4366"]]},

  {"n":3,"day":1,"lat":55.6873,"lng":12.6064,
   "name":"Skibene på Holmen",
   "meta":"Elefanten 2, 1439 København K · OBS: Kun rundvisninger – ingen fri entre",
   "teaser":"Oplev den kolde krig til søs ombord på fregatten Peder Skram, ubåden Sælen og Mastekranen. · Kræver forhåndsbooking · Min. 10 pers. · Peder Skram + ét skib (1,5–2t): 220 kr./pers. · Alle 3 skibe (2,5–3t): 330 kr./pers.",
   "links":[["Book rundvisning","https://www.skibenepaaholmen.dk/rundvisninger"],["Kort","https://maps.google.com/?q=55.6873,12.6064"]]},

  {"n":4,"day":2,"lat":55.6741,"lng":12.5805,
   "name":"Krigsmuseet",
   "meta":"Tøjhusgade 3, 1220 København K",
   "teaser":"Danmarks krigshistorie gennem 500 år – fra danefæ og kanoner til Danmarks moderne krigsdeltagelse. · Grupperabat: 10% ved 10+ voksne · Forsvarets personel og veteraner: 20% rabat (gælder også ledsager).",
   "links":[["Læs mere","https://krigsmuseet.dk/"],["Kort","https://maps.google.com/?q=55.6741,12.5805"]]},

  {"n":5,"day":2,"lat":55.6881,"lng":12.5959,
   "name":"Frihedsmuseet",
   "meta":"Esplanaden 13, 1263 København K",
   "teaser":"Historien om den danske modstandskamp under Besættelsen 1940–1945 i moderne, underjordiske rammer. · Voksne: 130 kr. · Grupperabat: 10% ved 10+ voksne.",
   "links":[["Læs mere","https://frihedsmuseet.dk/praktisk-information"],["Kort","https://maps.google.com/?q=55.6881,12.5959"]]}
];

const DAYS=[
  {"d":1,"label":"Lørdag – dag 1","title":"Den Kolde Krig på Sjælland",
   "sub":"Slagelse → Ejbybunkeren → Holmen",
   "over":"Skalstrup · overnatning lørdag nat",
   "stops":[1,2,3],"warn":"Skibene på Holmen kræver forhåndsbooking – der er ingen fri entré i åbningstiden. Book rundvisning på skibenepaaholmen.dk inden afrejse.",
   "extras":[{"title":"Andre muligheder i området","items":[
     ["Garnisonskirkegården & Nyboder","https://maps.google.com/?q=55.6895,12.5880","Militærhistorisk walk tæt på Holmen og centrum."],
     ["Sporvejsmuseet Skjoldenæsholm","https://maps.google.com/?q=55.5085,11.9701","Historiske sporvogne og transport i Jystrup."]
   ]}]},

  {"d":2,"label":"Søndag – dag 2","title":"Besættelse og krigshistorie",
   "sub":"Krigsmuseet og Frihedsmuseet · København C",
   "over":"Afrejse / hjemtransport efter Frihedsmuseet",
   "stops":[4,5],"warn":null}
];

const REGIONS={
  all:  STOPS.map(s=>[s.lat,s.lng]),
  dag1: STOPS.filter(s=>s.day===1).map(s=>[s.lat,s.lng]),
  dag2: STOPS.filter(s=>s.day===2).map(s=>[s.lat,s.lng]),
};

const map=L.map('map',{scrollWheelZoom:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap contributors'}).addTo(map);

const routePts=[
  [55.3498,11.5056],
  [55.6899,12.4366],
  [55.6873,12.6064],
  [55.5839,12.1126],
  [55.6741,12.5805],
  [55.6881,12.5959]
];
L.polyline(routePts,{color:'#888780',weight:2,dashArray:'7,5',opacity:0.6}).addTo(map);

const bedIcon=L.divIcon({
  html:'<div style="background:#343330;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;border:2px solid rgba(255,255,255,0.9);"><i class="ti ti-bed"></i></div>',
  className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-16]
});
L.marker([55.5839,12.1126],{icon:bedIcon}).addTo(map)
  .bindPopup('<b>Overnatning – Skalstrup</b><br><a href="https://maps.google.com/?q=55.5839,12.1126" target="_blank" style="font-size:11px;color:#185FA5;">Åbn i Google Maps</a>');

const markers={};
const sm=Object.fromEntries(STOPS.map(s=>[s.n,s]));

function renderLinks(links){
  if(!links||!links.length) return '';
  return '<div class="stop-links">'+links.map(([label,url])=>'<a href="'+url+'" target="_blank" rel="noopener">'+label+'</a>').join('')+'</div>';
}

STOPS.forEach(s=>{
  const c=COLORS[s.day];
  const icon=L.divIcon({
    html:'<div style="background:'+c+';width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,0.9);">'+s.n+'</div>',
    className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-16]
  });
  const m=L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.bindPopup('<b>Stop '+s.n+': '+s.name+'</b><br><span style="font-size:11px;color:#555;">'+s.meta+'</span><br><span style="font-size:11px;color:#333;margin-top:4px;display:block;">'+s.teaser+'</span>'+renderLinks(s.links));
  markers[s.n]=m;
});

const leg=L.control({position:'bottomleft'});
leg.onAdd=()=>{
  const d=L.DomUtil.create('div');
  d.style.cssText='background:rgba(255,255,255,0.96);padding:10px 12px;border-radius:8px;font-size:12px;line-height:2;font-family:sans-serif;border:1px solid rgba(0,0,0,0.1);';
  d.innerHTML=
    '<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+COLORS[1]+';vertical-align:middle;margin-right:7px;"></span>Dag 1 – Slagelse, Vestvolden & Holmen</div>'+
    '<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#343330;vertical-align:middle;margin-right:7px;"></span>Overnatning – Skalstrup</div>'+
    '<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+COLORS[2]+';vertical-align:middle;margin-right:7px;"></span>Dag 2 – København C</div>';
  return d;
};
leg.addTo(map);

function zoomRegion(r){map.fitBounds(L.latLngBounds(REGIONS[r]).pad(0.15));}
zoomRegion('all');

function flyToStop(n){
  const s=sm[n];
  map.setView([s.lat,s.lng],15,{animate:true,duration:0.8});
  setTimeout(()=>markers[n].openPopup(),850);
  document.getElementById('map').scrollIntoView({behavior:'smooth',block:'center'});
}

function extraHtml(day){
  if(!day.extras) return '';
  return day.extras.map(box=>'<div class="extra-box"><div class="extra-title">'+box.title+'</div>'+
    box.items.map(([name,url,txt])=>'<div class="extra-item"><a href="'+url+'" target="_blank" rel="noopener">'+name+'</a> – '+txt+'</div>').join('')+
    '</div>').join('');
}

const colA=document.getElementById('col-a');
const colB=document.getElementById('col-b');

DAYS.forEach((day,i)=>{
  const col=i===0?colA:colB;
  const c=COLORS[day.d];
  const items=day.stops.map(n=>{
    const s=sm[n];
    return '<div class="stop-row">'+
      '<span class="stop-num" style="background:'+c+';">'+n+'</span>'+
      '<div>'+
        '<div class="stop-name" style="color:'+c+';text-decoration-color:'+c+'55;" onclick="flyToStop('+n+')">'+s.name+'</div>'+
        '<div class="stop-desc">'+s.meta+'</div>'+
        '<div class="stop-teaser">'+s.teaser+'</div>'+
        renderLinks(s.links)+
      '</div></div>';
  }).join('');
  const warnHtml=day.warn?'<div class="warn-box"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:4px;"></i>'+day.warn+'</div>':'';
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=
    '<div style="background:'+c+';padding:9px 12px;">'+
      '<div class="card-day">'+day.label+'</div>'+
      '<div class="card-title">'+day.title+'</div>'+
      '<div class="card-sub">'+day.sub+'</div>'+
    '</div>'+
    '<div class="card-body">'+items+'</div>'+
    warnHtml+extraHtml(day)+
    '<div class="card-footer"><i class="ti ti-bed"></i><span>'+day.over+'</span></div>';
  col.appendChild(card);
});
</script>
</body>
</html>
